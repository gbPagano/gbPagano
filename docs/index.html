<!doctype html>
<html lang="en">
<script>document.documentElement.lang=navigator.language&&navigator.language.toLowerCase().startsWith('pt')?'pt-BR':'en'</script>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>gbPagano</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="mobile.css"/>
</head>
<body data-flavor="mocha" data-accent="mauve">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Sections.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULTS = {
  "accent": "mauve",
  "flavor": "mocha",
  "layout": "standard",
  "hero": "terminal",
  "showcase": "list",
  "font": "default",
  "density": "compact",
  "cardStyle": "default",
  "navAccent": "",
  "animations": true,
  "showAbout": true,
  "showGithub": true,
  "prompt": "gbpagano@arch"
};

function App() {
  const [lang, setLang] = useState(() => {
    const saved = localStorage.getItem('pf_lang');
    if (saved) return saved;
    const bl = (navigator.language || navigator.browserLanguage || '').toLowerCase();
    return bl.startsWith('pt') ? 'pt' : 'en';
  });
  const [tw, setTw] = useState(() => {
    try {
      const saved = localStorage.getItem('pf_accent');
      return saved ? { ...DEFAULTS, accent: saved } : DEFAULTS;
    } catch { return DEFAULTS; }
  });
  const [navOpen, setNavOpen] = useState(false);

  useEffect(() => {
    document.body.classList.toggle('nav-open', navOpen);
    return () => document.body.classList.remove('nav-open');
  }, [navOpen]);

  // Sync body attrs
  useEffect(() => {
    const b = document.body;
    b.setAttribute('data-accent', tw.accent);
    b.setAttribute('data-flavor', tw.flavor);
    b.setAttribute('data-layout', tw.layout);
    b.setAttribute('data-font', tw.font);
    b.setAttribute('data-density', tw.density);
    b.setAttribute('data-animations', tw.animations ? 'on' : 'off');
    b.setAttribute('data-card', tw.cardStyle);
    b.setAttribute('data-nav-accent', tw.navAccent || '');
  }, [tw]);

  useEffect(() => { localStorage.setItem('pf_lang', lang); document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en'; }, [lang]);

  const setKey = (k, v) => {
    setTw(prev => ({ ...prev, [k]: v }));
    if (k === 'accent') {
      try { localStorage.setItem('pf_accent', v); } catch {}
    }
  };

  const data = window.portfolioData;
  const isPT = lang === 'pt';

  // Dynamic prompt customization - inject CSS var
  useEffect(() => {
    let style = document.getElementById('dyn-style');
    if (!style) {
      style = document.createElement('style');
      style.id = 'dyn-style';
      document.head.appendChild(style);
    }
    style.textContent = `.term-prompt-custom::before { content: "${tw.prompt || 'gbpagano@arch'}"; }`;
  }, [tw.prompt]);

  const HeroComp = tw.hero === 'big' ? window.HeroBig : tw.hero === 'code' ? window.HeroCode : window.HeroTerminal;

  const navLinks = [
    tw.showAbout && { id:'about', n:'01', label: isPT?'sobre':'about' },
    { id:'experience', n:'02', label: isPT?'experiência':'experience' },
    { id:'projects', n:'03', label: isPT?'projetos':'projects' },
    { id:'skills', n:'04', label: 'stack' },
    tw.showGithub && { id:'github', n:'05', label: 'github' },
    { id:'contact', n:'06', label: isPT?'contato':'contact' },
  ].filter(Boolean);

  return (
    <>
      <nav className="topnav">
        <div className="topnav-inner">
          <a className="brand" href="#top">
            <img className="brand-mark" src="assets/luna.jpg" alt="Luna" />
            <span className="brand-name">gbPagano</span>
          </a>
          <div className="lang-pill nav-lang-pill">
            <button className={lang==='en'?'active':''} onClick={()=>setLang('en')}>EN</button>
            <button className={lang==='pt'?'active':''} onClick={()=>setLang('pt')}>PT</button>
          </div>
          <button
            type="button"
            className="nav-toggle"
            aria-label="menu"
            aria-expanded={navOpen}
            onClick={() => setNavOpen(o => !o)}
          >
            {navOpen
              ? (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>)
              : (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>)}
          </button>
          <div className="nav-links">
            {navLinks.map(l => (
              <a key={l.id} className="nav-link" href={`#${l.id}`} onClick={() => setNavOpen(false)}><span className="nav-num">{l.n}.</span>{l.label}</a>
            ))}
            <div className="lang-pill nav-lang-pill-desktop">
              <button className={lang==='en'?'active':''} onClick={()=>setLang('en')}>EN</button>
              <button className={lang==='pt'?'active':''} onClick={()=>setLang('pt')}>PT</button>
            </div>
            <a className="btn" href={isPT?'assets/cv-guilhermebpagano-pt.pdf':'assets/resume-gbpagano-en.pdf'} download style={{marginLeft:8,padding:'8px 14px',fontSize:12}}>
              <window.Icon name="download" size={13}/> CV
            </a>
          </div>
        </div>
      </nav>

      <main id="top">
        {tw.layout === 'ide' ? (
          <div className="ide-shell">
            <aside className="ide-side">
              <div className="ide-side-group">
                <div className="ide-side-label">Explorer</div>
                {navLinks.map(l => (
                  <a key={l.id} className="ide-side-item" href={`#${l.id}`}>
                    <span className="i">#</span>{l.label}.md
                  </a>
                ))}
              </div>
            </aside>
            <div className="ide-main">
              <HeroComp lang={lang} data={data} animations={tw.animations}/>
              {tw.showAbout && <window.About lang={lang} data={data}/>}
              <window.Experience lang={lang} data={data}/>
              <window.Projects lang={lang} data={data} showcase={tw.showcase}/>
              <window.Skills lang={lang} data={data}/>
              {tw.showGithub && <window.GithubStats lang={lang} data={data}/>}
              <window.Contact lang={lang} data={data}/>
            </div>
          </div>
        ) : (
          <>
            <HeroComp lang={lang} data={data} animations={tw.animations}/>
            {tw.showAbout && <window.About lang={lang} data={data}/>}
            <window.Experience lang={lang} data={data}/>
            <window.Projects lang={lang} data={data} showcase={tw.showcase}/>
            <window.Skills lang={lang} data={data}/>
            {tw.showGithub && <window.GithubStats lang={lang} data={data}/>}
            <window.Contact lang={lang} data={data}/>
          </>
        )}
      </main>

      <window.Footer lang={lang} accent={tw.accent} setAccent={(a)=>setKey('accent', a)}/>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
