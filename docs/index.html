<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>gbPagano</title>
<link rel="icon" href="assets/luna.png"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body data-flavor="mocha" data-accent="mauve">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Sections.jsx"></script>
<script type="text/babel" src="components/Tweaks.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "mauve",
  "flavor": "mocha",
  "layout": "standard",
  "hero": "terminal",
  "showcase": "list",
  "font": "default",
  "density": "compact",
  "cardStyle": "default",
  "navAccent": "",
  "animations": true,
  "showAbout": true,
  "showGithub": true,
  "prompt": "gbpagano@arch"
}/*EDITMODE-END*/;

function App() {
  const [lang, setLang] = useState(() => localStorage.getItem('pf_lang') || 'en');
  const [tw, setTw] = useState(DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  // Sync body attrs
  useEffect(() => {
    const b = document.body;
    b.setAttribute('data-accent', tw.accent);
    b.setAttribute('data-flavor', tw.flavor);
    b.setAttribute('data-layout', tw.layout);
    b.setAttribute('data-font', tw.font);
    b.setAttribute('data-density', tw.density);
    b.setAttribute('data-animations', tw.animations ? 'on' : 'off');
    b.setAttribute('data-card', tw.cardStyle);
    b.setAttribute('data-nav-accent', tw.navAccent || '');
  }, [tw]);

  useEffect(() => { localStorage.setItem('pf_lang', lang); }, [lang]);

  // Edit mode host protocol
  useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setKey = (k, v) => {
    setTw(prev => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      return next;
    });
  };

  const data = window.portfolioData;
  const isPT = lang === 'pt';

  // Dynamic prompt customization - inject CSS var
  useEffect(() => {
    let style = document.getElementById('dyn-style');
    if (!style) {
      style = document.createElement('style');
      style.id = 'dyn-style';
      document.head.appendChild(style);
    }
    style.textContent = `.term-prompt-custom::before { content: "${tw.prompt || 'gbpagano@arch'}"; }`;
  }, [tw.prompt]);

  const HeroComp = tw.hero === 'big' ? window.HeroBig : tw.hero === 'code' ? window.HeroCode : window.HeroTerminal;

  const navLinks = [
    tw.showAbout && { id:'about', n:'01', label: isPT?'sobre':'about' },
    { id:'experience', n:'02', label: isPT?'experiência':'experience' },
    { id:'projects', n:'03', label: isPT?'projetos':'projects' },
    { id:'skills', n:'04', label: 'stack' },
    tw.showGithub && { id:'github', n:'05', label: 'github' },
    { id:'contact', n:'06', label: isPT?'contato':'contact' },
  ].filter(Boolean);

  return (
    <>
      <nav className="topnav">
        <div className="topnav-inner">
          <a className="brand" href="#top">
            <img className="brand-mark" src="assets/luna.jpg" alt="Luna" />
            <span className="brand-name">gbPagano</span>
          </a>
          <div className="nav-links">
            {navLinks.map(l => (
              <a key={l.id} className="nav-link" href={`#${l.id}`}><span className="nav-num">{l.n}.</span>{l.label}</a>
            ))}
            <div className="lang-pill">
              <button className={lang==='en'?'active':''} onClick={()=>setLang('en')}>EN</button>
              <button className={lang==='pt'?'active':''} onClick={()=>setLang('pt')}>PT</button>
            </div>
            <a className="btn" href={isPT?'assets/cv-guilhermebpagano-pt.pdf':'assets/resume-gbpagano-en.pdf'} download style={{marginLeft:8,padding:'8px 14px',fontSize:12}}>
              <window.Icon name="download" size={13}/> CV
            </a>
          </div>
        </div>
      </nav>

      <main id="top">
        {tw.layout === 'ide' ? (
          <div className="ide-shell">
            <aside className="ide-side">
              <div className="ide-side-group">
                <div className="ide-side-label">Explorer</div>
                {navLinks.map(l => (
                  <a key={l.id} className="ide-side-item" href={`#${l.id}`}>
                    <span className="i">#</span>{l.label}.md
                  </a>
                ))}
              </div>
            </aside>
            <div className="ide-main">
              <HeroComp lang={lang} data={data} animations={tw.animations}/>
              {tw.showAbout && <window.About lang={lang} data={data}/>}
              <window.Experience lang={lang} data={data}/>
              <window.Projects lang={lang} data={data} showcase={tw.showcase}/>
              <window.Skills lang={lang} data={data}/>
              {tw.showGithub && <window.GithubStats lang={lang} data={data}/>}
              <window.Contact lang={lang} data={data}/>
            </div>
          </div>
        ) : (
          <>
            <HeroComp lang={lang} data={data} animations={tw.animations}/>
            {tw.showAbout && <window.About lang={lang} data={data}/>}
            <window.Experience lang={lang} data={data}/>
            <window.Projects lang={lang} data={data} showcase={tw.showcase}/>
            <window.Skills lang={lang} data={data}/>
            {tw.showGithub && <window.GithubStats lang={lang} data={data}/>}
            <window.Contact lang={lang} data={data}/>
          </>
        )}
      </main>

      <window.Footer lang={lang} accent={tw.accent} setAccent={(a)=>setKey('accent', a)}/>

      <window.TweaksPanel state={tw} set={setKey} active={editMode} onClose={()=>{
        setEditMode(false);
        window.parent.postMessage({ type:'__deactivate_edit_mode' }, '*');
      }}/>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
